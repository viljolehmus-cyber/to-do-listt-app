<!DOCTYPE html>
<html>
<head><title>Ikoni-generaattori</title></head>
<body>
<p>Klikkaa nappeja tallentaaksesi ikonit. Tallenna tiedostot nimillä <code>icon-192.png</code> ja <code>icon-512.png</code> kansioon <code>icons/</code>.</p>
<canvas id="c192" width="192" height="192" style="border:1px solid #ccc;margin:8px"></canvas>
<canvas id="c512" width="512" height="512" style="border:1px solid #ccc;margin:8px"></canvas>
<br>
<button onclick="save('c192','icon-192.png')">Tallenna icon-192.png</button>
<button onclick="save('c512','icon-512.png')">Tallenna icon-512.png</button>
<script>
function drawIcon(canvas) {
  const ctx = canvas.getContext('2d');
  const s = canvas.width;
  const r = s * 0.22;
  // Tausta
  const grad = ctx.createLinearGradient(0,0,s,s);
  grad.addColorStop(0,'#6366f1');
  grad.addColorStop(1,'#ec4899');
  ctx.fillStyle = grad;
  roundRect(ctx, 0, 0, s, s, r);
  ctx.fill();
  // Symboli ✦
  ctx.fillStyle = 'rgba(255,255,255,0.95)';
  ctx.font = `bold ${s*0.52}px sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('✦', s/2, s/2+s*0.02);
}
function roundRect(ctx,x,y,w,h,r){
  ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);
  ctx.arcTo(x+w,y,x+w,y+r,r);ctx.lineTo(x+w,y+h-r);
  ctx.arcTo(x+w,y+h,x+w-r,y+h,r);ctx.lineTo(x+r,y+h);
  ctx.arcTo(x,y+h,x,y+h-r,r);ctx.lineTo(x,y+r);
  ctx.arcTo(x,y,x+r,y,r);ctx.closePath();
}
function save(id,name){
  const a=document.createElement('a');
  a.href=document.getElementById(id).toDataURL('image/png');
  a.download=name;a.click();
}
drawIcon(document.getElementById('c192'));
drawIcon(document.getElementById('c512'));
</script>
</body>
</html>
